spring:
  datasource:
    # Perfil para PostgreSQL. Mantiene PostgreSQL como default y usa Postgres cuando
    # se arranca con SPRING_PROFILES_ACTIVE=postgres.
    url: ${POSTGRES_URL:jdbc:postgresql://localhost:5432/identity_db}
    username: ${POSTGRES_USER:identity_user}
    password: ${POSTGRES_PASSWORD:identity_password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      # Suficiente para desarrollo. En produccion lo cambiaremos por Flyway/Liquibase.
      ddl-auto: update
