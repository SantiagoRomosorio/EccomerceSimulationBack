spring:
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: identity-service
              uri: http://localhost:8081
              predicates:
                - Path=/api/auth/**,/api/users/**
            - id: identity-health
              uri: http://localhost:8081
              predicates:
                - Path=/api/identity/health
              filters:
                - RewritePath=/api/identity/health,/api/health
            - id: catalog-service
              uri: http://localhost:8082
              predicates:
                - Path=/api/products/**,/api/categories/**,/api/brands/**
            - id: catalog-health
              uri: http://localhost:8082
              predicates:
                - Path=/api/catalog/health
              filters:
                - RewritePath=/api/catalog/health,/api/health
            - id: commerce-service
              uri: http://localhost:8083
              predicates:
                - Path=/api/cart/**,/api/checkout/**,/api/orders/**
            - id: commerce-health
              uri: http://localhost:8083
              predicates:
                - Path=/api/commerce/health
              filters:
                - RewritePath=/api/commerce/health,/api/health
