server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webflux:
          default-filters:
            - RemoveRequestHeader=X-Internal-Gateway-Token
            - SetRequestHeader=X-Internal-Gateway-Token, ${internal.gateway-token}
          # Kubernetes resuelve estos nombres por DNS interno.
          # No usamos Eureka ni discovery client de Spring.
          routes:
            - id: identity-service
              uri: http://identity-service:8080
              predicates:
                - Path=/api/auth/**,/api/users/**
            - id: identity-health
              uri: http://identity-service:8080
              predicates:
                - Path=/api/identity/health
              filters:
                - RewritePath=/api/identity/health,/api/health
            - id: identity-openapi
              uri: http://identity-service:8080
              predicates:
                - Path=/api/identity/v3/api-docs
              filters:
                - RewritePath=/api/identity/v3/api-docs,/v3/api-docs
            - id: catalog-service
              uri: http://catalog-service:8080
              predicates:
                - Path=/api/products/**,/api/categories/**,/api/brands/**
            - id: catalog-health
              uri: http://catalog-service:8080
              predicates:
                - Path=/api/catalog/health
              filters:
                - RewritePath=/api/catalog/health,/api/health
            - id: catalog-openapi
              uri: http://catalog-service:8080
              predicates:
                - Path=/api/catalog/v3/api-docs
              filters:
                - RewritePath=/api/catalog/v3/api-docs,/v3/api-docs
            - id: commerce-service
              uri: http://commerce-service:8080
              predicates:
                - Path=/api/cart/**,/api/checkout/**,/api/orders/**
            - id: commerce-health
              uri: http://commerce-service:8080
              predicates:
                - Path=/api/commerce/health
              filters:
                - RewritePath=/api/commerce/health,/api/health
            - id: commerce-openapi
              uri: http://commerce-service:8080
              predicates:
                - Path=/api/commerce/v3/api-docs
              filters:
                - RewritePath=/api/commerce/v3/api-docs,/v3/api-docs

internal:
  gateway-token: ${INTERNAL_GATEWAY_TOKEN:local-internal-gateway-token-change-me}

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: Identity
        url: /api/identity/v3/api-docs
      - name: Catalog
        url: /api/catalog/v3/api-docs
      - name: Commerce
        url: /api/commerce/v3/api-docs

security:
  jwt:
    # El gateway es el punto central de validacion JWT.
    # Los microservicios internos no deben repetir filtros JWT; reciben identidad
    # validada por headers internos: X-User-Id, X-User-Email, X-User-Roles y
    # X-User-Scopes.
    # En Kubernetes esto debe venir de un Secret, no quedar hardcodeado.
    secret: ${JWT_SECRET:change-this-secret-key-change-this-secret-key}

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    health:
      probes:
        enabled: true
