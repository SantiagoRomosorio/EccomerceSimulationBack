server:
  port: 8080

spring:
  application:
    name: hexagonal-spring-boot
  datasource:
    url: jdbc:postgresql://localhost:5432/postgres
    username: sa
    password:
    driver-class-name: org.postgresql.Driver
  postgres:
    console:
      enabled: true
      path: /postgres-console
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    show-sql: true
    properties:
      hibernate:
        format_sql: true

security:
  jwt:
    secret: "change-this-secret-key-change-this-secret-key"
    expiration-minutes: 60

springdoc:
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info
