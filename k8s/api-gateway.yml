apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: ecommerce
  labels:
    app: api-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: ecommerce/api-gateway:0.0.1
          imagePullPolicy: IfNotPresent
          env:
            # El Secret evita repetir la clave JWT en cada microservicio.
            # Solo el gateway valida tokens; identity-service firmara tokens
            # usando el mismo Secret cuando lo creemos.
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: ecommerce-jwt
                  key: secret
            - name: INTERNAL_GATEWAY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: ecommerce-internal-gateway
                  key: token
          ports:
            - containerPort: 8080
          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 15
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: ecommerce
  labels:
    app: api-gateway
spec:
  type: LoadBalancer
  selector:
    app: api-gateway
  ports:
    - name: http
      port: 80
      targetPort: 8080
