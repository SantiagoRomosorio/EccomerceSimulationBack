apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog-service
  namespace: ecommerce
  labels:
    app: catalog-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: catalog-service
  template:
    metadata:
      labels:
        app: catalog-service
    spec:
      initContainers:
        - name: wait-for-catalog-postgres
          image: postgres:16-alpine
          command:
            - sh
            - -c
            - >
              until pg_isready -h catalog-postgres -p 5432 -U "$(CATALOG_DB_USERNAME)" -d catalog_db;
              do echo "waiting for catalog-postgres"; sleep 2; done
          env:
            - name: CATALOG_DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: catalog-postgres
                  key: username
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: catalog-postgres
                  key: password
      containers:
        - name: catalog-service
          image: ecommerce/catalog-service:0.0.1
          imagePullPolicy: IfNotPresent
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: postgres
            - name: CATALOG_DB_URL
              value: jdbc:postgresql://catalog-postgres:5432/catalog_db
            - name: CATALOG_DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: catalog-postgres
                  key: username
            - name: CATALOG_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: catalog-postgres
                  key: password
            - name: INTERNAL_GATEWAY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: ecommerce-internal-gateway
                  key: token
          ports:
            - containerPort: 8080
          startupProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 15
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: catalog-service
  namespace: ecommerce
  labels:
    app: catalog-service
spec:
  type: ClusterIP
  selector:
    app: catalog-service
  ports:
    - name: http
      port: 8080
      targetPort: 8080
