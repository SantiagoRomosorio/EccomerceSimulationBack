apiVersion: apps/v1
kind: Deployment
metadata:
  name: identity-service
  namespace: ecommerce
  labels:
    app: identity-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: identity-service
  template:
    metadata:
      labels:
        app: identity-service
    spec:
      initContainers:
        - name: wait-for-identity-postgres
          image: postgres:16-alpine
          command:
            - sh
            - -c
            - >
              until pg_isready -h identity-postgres -p 5432 -U "$(POSTGRES_USER)" -d identity_db;
              do echo "waiting for identity-postgres"; sleep 2; done
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: identity-postgres
                  key: username
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: identity-postgres
                  key: password
      containers:
        - name: identity-service
          image: ecommerce/identity-service:0.0.1
          imagePullPolicy: IfNotPresent
          env:
            # Debe coincidir con el Secret usado por api-gateway.
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: ecommerce-jwt
                  key: secret
            - name: SPRING_PROFILES_ACTIVE
              value: postgres
            - name: INTERNAL_GATEWAY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: ecommerce-internal-gateway
                  key: token
            - name: POSTGRES_URL
              value: jdbc:postgresql://identity-postgres:5432/identity_db
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: identity-postgres
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: identity-postgres
                  key: password
          ports:
            - containerPort: 8080
          startupProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 15
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: identity-service
  namespace: ecommerce
  labels:
    app: identity-service
spec:
  type: ClusterIP
  selector:
    app: identity-service
  ports:
    - name: http
      port: 8080
      targetPort: 8080
