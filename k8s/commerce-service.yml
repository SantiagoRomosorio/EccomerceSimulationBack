apiVersion: apps/v1
kind: Deployment
metadata:
  name: commerce-service
  namespace: ecommerce
  labels:
    app: commerce-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: commerce-service
  template:
    metadata:
      labels:
        app: commerce-service
    spec:
      initContainers:
        - name: wait-for-commerce-postgres
          image: postgres:16-alpine
          command:
            - sh
            - -c
            - >
              until pg_isready -h commerce-postgres -p 5432 -U "$(COMMERCE_DB_USERNAME)" -d commerce_db;
              do echo "waiting for commerce-postgres"; sleep 2; done
          env:
            - name: COMMERCE_DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: commerce-postgres
                  key: username
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: commerce-postgres
                  key: password
      containers:
        - name: commerce-service
          image: ecommerce/commerce-service:0.0.1
          imagePullPolicy: IfNotPresent
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: postgres
            - name: COMMERCE_DB_URL
              value: jdbc:postgresql://commerce-postgres:5432/commerce_db
            - name: COMMERCE_DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: commerce-postgres
                  key: username
            - name: COMMERCE_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: commerce-postgres
                  key: password
            - name: CATALOG_SERVICE_URL
              value: http://catalog-service:8080
            - name: INTERNAL_GATEWAY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: ecommerce-internal-gateway
                  key: token
          ports:
            - containerPort: 8080
          startupProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 15
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: commerce-service
  namespace: ecommerce
  labels:
    app: commerce-service
spec:
  type: ClusterIP
  selector:
    app: commerce-service
  ports:
    - name: http
      port: 8080
      targetPort: 8080
