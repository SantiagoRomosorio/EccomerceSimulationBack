apiVersion: apps/v1
kind: Deployment
metadata:
  name: commerce-service
  namespace: ecommerce
  labels:
    app: commerce-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: commerce-service
  template:
    metadata:
      labels:
        app: commerce-service
    spec:
      containers:
        - name: commerce-service
          image: ecommerce/commerce-service:0.0.1
          imagePullPolicy: IfNotPresent
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: postgres
            - name: COMMERCE_DB_URL
              value: jdbc:postgresql://commerce-postgres:5432/commerce_db
            - name: COMMERCE_DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: commerce-postgres
                  key: username
            - name: COMMERCE_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: commerce-postgres
                  key: password
            - name: CATALOG_SERVICE_URL
              value: http://catalog-service:8080
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: commerce-service
  namespace: ecommerce
  labels:
    app: commerce-service
spec:
  type: ClusterIP
  selector:
    app: commerce-service
  ports:
    - name: http
      port: 8080
      targetPort: 8080
