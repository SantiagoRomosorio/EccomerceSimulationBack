apiVersion: v1
kind: Secret
metadata:
  name: identity-postgres
  namespace: ecommerce
type: Opaque
stringData:
  username: identity_user
  password: identity_password
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: identity-postgres-data
  namespace: ecommerce
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: identity-postgres
  namespace: ecommerce
  labels:
    app: identity-postgres
spec:
  strategy:
    type: Recreate
  replicas: 1
  selector:
    matchLabels:
      app: identity-postgres
  template:
    metadata:
      labels:
        app: identity-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          env:
            - name: POSTGRES_DB
              value: identity_db
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: identity-postgres
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: identity-postgres
                  key: password
          ports:
            - containerPort: 5432
          startupProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            failureThreshold: 60
            periodSeconds: 2
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: identity-postgres-data
---
apiVersion: v1
kind: Service
metadata:
  name: identity-postgres
  namespace: ecommerce
  labels:
    app: identity-postgres
spec:
  type: ClusterIP
  selector:
    app: identity-postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
