server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: commerce-service
  datasource:
    url: ${COMMERCE_DB_URL:jdbc:postgresql://localhost:5432/commercedb}
    username: ${COMMERCE_DB_USERNAME:commerce}
    password: ${COMMERCE_DB_PASSWORD:commerce}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

clients:
  catalog:
    base-url: ${CATALOG_SERVICE_URL:http://localhost:8082}
