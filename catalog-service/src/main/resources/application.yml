server:
  # En Kubernetes todos los servicios escuchan 8080; localmente puedes usar SERVER_PORT=8082.
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: catalog-service
  datasource:
    url: ${CATALOG_DB_URL:jdbc:postgresql://localhost:5432/catalogdb}
    username: ${CATALOG_DB_USERNAME:catalog}
    password: ${CATALOG_DB_PASSWORD:catalog}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    show-sql: true
    properties:
      hibernate:
        format_sql: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
