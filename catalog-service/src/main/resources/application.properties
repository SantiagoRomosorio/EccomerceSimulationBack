# Internal OpenAPI docs are enabled for api-gateway aggregation.
# All service HTTP endpoints require the internal gateway token at runtime.
springdoc.api-docs.enabled=${SPRINGDOC_API_DOCS_ENABLED:true}
springdoc.swagger-ui.enabled=${SPRINGDOC_SWAGGER_UI_ENABLED:false}
internal.gateway-token=${INTERNAL_GATEWAY_TOKEN:local-internal-gateway-token-change-me}
internal.gateway-protection.enabled=${INTERNAL_GATEWAY_PROTECTION_ENABLED:true}
