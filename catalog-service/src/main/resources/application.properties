# Internal OpenAPI docs are enabled for api-gateway aggregation and guarded by a private header.
springdoc.api-docs.enabled=${SPRINGDOC_API_DOCS_ENABLED:true}
springdoc.swagger-ui.enabled=${SPRINGDOC_SWAGGER_UI_ENABLED:false}
docs.gateway-token=${DOCS_GATEWAY_TOKEN:local-docs-token-change-me}
docs.gateway-protection.enabled=${DOCS_GATEWAY_PROTECTION_ENABLED:true}
